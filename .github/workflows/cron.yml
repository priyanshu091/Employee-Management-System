name: Attendance Cron

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Mark Absent API
        run: |
          echo "Pinging Vercel API endpoint..."
          
          # We use the -f flag to fail silently on server errors, -sS for silent but show errors
          HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X GET "${{ secrets.PROD_URL }}/api/cron/mark-absent" -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          
          echo "Received HTTP Status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Cron API failed with status $HTTP_STATUS"
            exit 1
          fi
